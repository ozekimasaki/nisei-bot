services:
  db:
    image: postgres:16-alpine
    container_name: chisei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chisei
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chisei
    ports:
      - "5432:5432"
    volumes:
      - chisei-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chisei -d chisei"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  chisei-postgres-data:
